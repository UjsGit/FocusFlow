<!DOCTYPE html>
<html>
<head>
    <title>FocusFlow Statistics</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; display: flex; justify-content: center; }
        .container { width: 400px; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #3ea6ff; font-size: 24px; margin-bottom: 30px; text-align: center; }
        .stat-card { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 32px; font-weight: bold; margin: 10px 0; color: #ff8989; }
        .grade { font-size: 48px; color: #3ea6ff; font-weight: 900; margin-top: 10px; }
        .hint { font-size: 13px; color: #666; margin-top: 20px; text-align: center; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Learning Dashboard</h1>
        
        <div class="stat-card">
            <div class="label">Lifetime Impulse Peeks</div>
            <div id="lifePeeks" class="value">0</div>
            <div style="font-size: 11px; color: #555;">(Lower is better)</div>
        </div>

        <div class="stat-card">
            <div class="label">Your Focus Grade</div>
            <div id="grade" class="grade">-</div>
            <div id="gradeLabel" style="color: #888; margin-top: 5px;">Keep studying!</div>
        </div>

        <div class="hint">"The secret to focus is not avoiding distraction, but making it harder to reach."</div>
    </div>

    <script>
        chrome.storage.local.get(['totalLifetimePeeks'], (res) => {
            const total = res.totalLifetimePeeks || 0;
            document.getElementById('lifePeeks').innerText = total;

            let grade = "S";
            let desc = "Elite Focus";
            if (total > 20) { grade = "A"; desc = "Great Discipline"; }
            if (total > 50) { grade = "B"; desc = "Solid Learner"; }
            if (total > 100) { grade = "C"; desc = "Easily Distracted"; }
            if (total > 200) { grade = "F"; desc = "Focus Needed!"; }

            document.getElementById('grade').innerText = grade;
            document.getElementById('gradeLabel').innerText = desc;
        });
    </script>
</body>
</html>
